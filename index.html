<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Cuti AERYN SALON</title> 
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        
        .app-container {
            width: 100%;
            max-width: 420px;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, #ab47bc 0%, #8e24aa 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
            font-size: 22px; /* Sedikit dikecilkan agar teks yang panjang muat dengan rapi di layar HP */
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-container {
            padding: 0 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fafafa;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #ab47bc;
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(171, 71, 188, 0.1);
        }

        .btn-submit {
            background: linear-gradient(135deg, #ab47bc 0%, #8e24aa 100%);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 30px;
            font-size: 17px;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 40px;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(142, 36, 170, 0.3);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:active {
            transform: scale(0.97);
            box-shadow: 0 2px 5px rgba(142, 36, 170, 0.3);
            background: #7b1fa2;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            📝 Form Cuti AERYN SALON
        </div>

        <div class="form-container">
            <form id="formCuti">
                <div class="form-group">
                    <label>Nama Lengkap Karyawan</label>
                    <input type="text" name="nama" required placeholder="Contoh: Siti Aminah">
                </div>

                <div class="form-group">
                    <label>Tanggal Mulai Cuti</label>
                    <input type="date" name="mulai" required>
                </div>

                <div class="form-group">
                    <label>Tanggal Selesai Cuti</label>
                    <input type="date" name="selesai" required>
                </div>

                <div class="form-group">
                    <label>Tanggal Masuk Kerja Kembali</label>
                    <input type="date" name="tanggal_masuk" required>
                </div>

                <div class="form-group">
                    <label>Alasan Cuti / Keperluan</label>
                    <textarea name="alasan" rows="4" required placeholder="Tuliskan alasan yang jelas..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="btnKirim">Ajukan Cuti</button>
            </form>
        </div>
    </div>

    <script>
        // URL Apps Script Anda
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxobm2aX1rrbJvf_lorFjd2mL1uV5qi_pDFXHMbCjMGQ8qhk2GhvZM9JkIwdFmjcuK-/exec';
        const form = document.getElementById('formCuti');
        const btnKirim = document.getElementById('btnKirim');

        form.addEventListener('submit', e => {
            e.preventDefault(); 
            
            btnKirim.innerText = "Mengirim...";
            btnKirim.style.background = "#ccc"; 
            btnKirim.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
                .then(response => {
                    alert("✅ Yey! Pengajuan cuti berhasil dikirim ke Manajemen.");
                    form.reset(); 
                    btnKirim.innerText = "Ajukan Cuti"; 
                    btnKirim.style.background = "linear-gradient(135deg, #ab47bc 0%, #8e24aa 100%)";
                    btnKirim.disabled = false;
                })
                .catch(error => {
                    alert("❌ Gagal mengirim. Pastikan internet Anda aktif!");
                    console.error('Error!', error.message);
                    btnKirim.innerText = "Coba Lagi";
                    btnKirim.style.background = "linear-gradient(135deg, #ab47bc 0%, #8e24aa 100%)";
                    btnKirim.disabled = false;
                });
        });
    </script>

</body>
</html>
